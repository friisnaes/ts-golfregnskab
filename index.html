<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUCCI Golf - Sæson 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #0c1a0e;
            --dark-green: #142318;
            --green: #1a3a24;
            --green-mid: #264d34;
            --green-light: #3a6b4a;
            --gold: #c9a84c;
            --gold-light: #dfc06e;
            --gold-dim: #8a7233;
            --cream: #f4f0e8;
            --cream-dark: #e8e0d0;
            --text-light: #d4cfc4;
            --text-muted: #8a8578;
            --white: #faf8f4;
            --card-bg: rgba(255,255,255,0.04);
            --card-border: rgba(201,168,76,0.15);
            --shadow: 0 4px 30px rgba(0,0,0,0.3);

            /* Score colors */
            --sc-eagle: #c9a84c;
            --sc-birdie-bg: rgba(45,138,110,0.35);
            --sc-birdie-text: #7de8c4;
            --sc-par-bg: rgba(255,255,255,0.05);
            --sc-par-text: #d4cfc4;
            --sc-bogey-bg: rgba(180,110,40,0.22);
            --sc-bogey-text: #e8b880;
            --sc-double-bg: rgba(180,55,55,0.28);
            --sc-double-text: #e89090;
            --sc-triple-bg: rgba(140,20,20,0.35);
            --sc-triple-text: #e07070;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            color: var(--text-light);
            background: var(--dark);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 0%, rgba(26,58,36,0.6) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 100%, rgba(26,58,36,0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ── Hero ── */
        .hero {
            position: relative;
            height: 340px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .hero-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 60%;
            filter: brightness(0.55) saturate(1.1);
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(12,26,14,0.3) 0%, rgba(12,26,14,0.5) 50%, rgba(12,26,14,0.85) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            padding: 0 24px;
            animation: fadeDown 0.8s ease-out;
        }

        header { padding: 0; border-bottom: 1px solid var(--card-border); }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 3.6em;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--white);
            margin-bottom: 8px;
        }

        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-style: italic;
            font-weight: 400;
            color: var(--gold);
            letter-spacing: 0.25em;
            text-transform: uppercase;
        }

        .divider { width: 60px; height: 1px; background: var(--gold); margin: 24px auto; opacity: 0.5; }

        /* ── Sections ── */
        section { padding: 60px 0; }

        h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 1.6em;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 40px;
            opacity: 0;
            animation: fadeUp 0.6s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-subtitle {
            font-size: 0.82em;
            color: var(--text-muted);
            letter-spacing: 0.08em;
            margin-top: -30px;
            margin-bottom: 36px;
        }

        /* ── Leaderboard ── */
        .leaderboard { display: flex; flex-direction: column; gap: 12px; }

        .player-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 24px 32px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            gap: 24px;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0;
            animation: fadeUp 0.5s ease-out forwards;
        }

        .player-card:nth-child(1) { animation-delay: 0.1s; }
        .player-card:nth-child(2) { animation-delay: 0.2s; }
        .player-card:nth-child(3) { animation-delay: 0.3s; }
        .player-card:nth-child(4) { animation-delay: 0.4s; }

        .player-card:hover {
            background: rgba(201,168,76,0.06);
            border-color: rgba(201,168,76,0.35);
            transform: translateX(6px);
        }

        .player-card.leader {
            border-color: rgba(201,168,76,0.4);
            background: linear-gradient(135deg, rgba(201,168,76,0.08) 0%, rgba(201,168,76,0.02) 100%);
        }

        .rank {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2em;
            font-weight: 600;
            color: var(--gold-dim);
            min-width: 48px;
            text-align: center;
        }

        .player-card.leader .rank { color: var(--gold); }

        .player-info { flex: 1; }

        .player-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5em;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.04em;
        }

        .player-card.leader .player-name { color: var(--gold-light); }

        .player-stats { font-size: 0.78em; color: var(--text-muted); margin-top: 4px; letter-spacing: 0.04em; }

        .total-points {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.4em;
            font-weight: 700;
            color: var(--white);
            min-width: 80px;
            text-align: right;
            letter-spacing: -0.02em;
        }

        .total-points .unit {
            font-size: 0.4em;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            vertical-align: super;
            margin-left: 2px;
        }

        /* ── Rounds ── */
        .rounds-section { border-top: 1px solid var(--card-border); }

        .round {
            border: 1px solid var(--card-border);
            border-radius: 4px;
            margin: 20px 0;
            overflow: hidden;
            opacity: 0;
            animation: fadeUp 0.5s ease-out forwards;
        }

        .round-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding: 24px 28px 16px;
        }

        .round-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.06em;
        }

        .round-date { font-size: 0.78em; color: var(--text-muted); letter-spacing: 0.04em; }

        .course {
            padding: 0 28px 20px;
            font-size: 0.88em;
            color: var(--gold-dim);
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            letter-spacing: 0.03em;
        }

        .course-meta {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            margin-left: 12px;
            font-style: normal;
            font-size: 0.85em;
            opacity: 0.65;
        }

        .course-meta span {
            font-family: 'Outfit', sans-serif;
            font-size: 0.78em;
            font-weight: 400;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        table { width: 100%; border-collapse: collapse; }

        th {
            padding: 12px 28px;
            text-align: left;
            font-size: 0.7em;
            font-weight: 500;
            color: var(--text-muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            background: rgba(0,0,0,0.15);
            border-top: 1px solid var(--card-border);
        }

        td {
            padding: 14px 28px;
            border-top: 1px solid rgba(255,255,255,0.04);
            font-size: 0.92em;
        }

        tr:first-child td { border-top: none; }

        .placement {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.1em;
            color: var(--white);
        }

        .points { font-weight: 500; color: var(--gold); font-size: 1em; }

        /* ── Scorecard Toggle ── */
        .scorecard-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: none;
            border: none;
            border-top: 1px solid var(--card-border);
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: 'Outfit', sans-serif;
            font-size: 0.72em;
            font-weight: 500;
            color: var(--gold-dim);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            transition: color 0.2s, background 0.2s;
        }

        .scorecard-toggle:hover {
            color: var(--gold);
            background: rgba(201,168,76,0.04);
        }

        .sc-toggle-icon {
            width: 18px;
            height: 18px;
            border: 1px solid currentColor;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1.1em;
            transition: transform 0.3s ease, background 0.2s;
        }

        .scorecard-toggle.open .sc-toggle-icon {
            transform: rotate(180deg);
            background: rgba(201,168,76,0.12);
        }

        .sc-toggle-label { flex: 1; }

        .sc-toggle-hint {
            font-size: 0.85em;
            opacity: 0.6;
            font-style: italic;
            letter-spacing: 0.04em;
            font-family: 'Cormorant Garamond', serif;
            text-transform: none;
            font-weight: 400;
        }

        /* ── Scorecard Panel ── */
        .scorecard-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.45s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .scorecard-inner {
            border-top: 1px solid rgba(201,168,76,0.1);
            background: rgba(0,0,0,0.18);
            padding: 24px 20px 28px;
        }

        .sc-player-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Individual player scorecard */
        .sc-player-block {
            background: rgba(255,255,255,0.025);
            border: 1px solid rgba(201,168,76,0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        .sc-player-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 20px;
            background: rgba(0,0,0,0.15);
            border-bottom: 1px solid rgba(201,168,76,0.08);
        }

        .sc-player-header-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-weight: 600;
            color: var(--white);
            letter-spacing: 0.04em;
            flex: 1;
        }

        .sc-hcp-badge {
            font-size: 0.7em;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.06em;
            font-family: 'Outfit', sans-serif;
        }

        .sc-total-badge {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.35em;
            font-weight: 700;
            color: var(--gold-light);
        }

        .sc-total-badge .sc-total-sub {
            font-size: 0.5em;
            font-weight: 400;
            color: var(--text-muted);
            font-family: 'Outfit', sans-serif;
            letter-spacing: 0.06em;
        }

        .sc-diff-badge {
            font-family: 'Outfit', sans-serif;
            font-size: 0.75em;
            font-weight: 600;
            padding: 3px 8px;
            border-radius: 12px;
            letter-spacing: 0.03em;
        }

        .sc-diff-badge.under { background: rgba(45,138,110,0.3); color: #7de8c4; }
        .sc-diff-badge.even { background: rgba(255,255,255,0.08); color: var(--text-muted); }
        .sc-diff-badge.over { background: rgba(180,55,55,0.25); color: #e89090; }

        /* The grid itself */
        .sc-table-wrap {
            overflow-x: auto;
            padding: 0;
        }

        .sc-table {
            border-collapse: collapse;
            width: 100%;
            min-width: 480px;
        }

        .sc-table th, .sc-table td {
            text-align: center;
            padding: 0;
            border: none;
            white-space: nowrap;
        }

        /* Row: hole numbers */
        .sc-row-holes th {
            padding: 10px 8px 6px;
            font-size: 0.68em;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            background: transparent;
            border-top: none;
        }

        .sc-row-holes .sc-label-cell {
            text-align: left;
            padding-left: 20px;
            padding-right: 12px;
            min-width: 70px;
            color: var(--text-muted);
            font-size: 0.62em;
        }

        /* Row: par */
        .sc-row-par td {
            padding: 4px 8px;
            font-size: 0.72em;
            color: var(--text-muted);
            background: rgba(0,0,0,0.1);
        }

        .sc-row-par .sc-label-cell {
            text-align: left;
            padding-left: 20px;
            color: var(--text-muted);
            font-size: 0.7em;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .sc-row-par .sc-total-col {
            font-weight: 600;
            color: var(--text-light);
        }

        /* Row: hcp */
        .sc-row-hcp td {
            padding: 3px 8px 8px;
            font-size: 0.65em;
            color: var(--text-muted);
            opacity: 0.5;
            background: rgba(0,0,0,0.1);
        }

        .sc-row-hcp .sc-label-cell {
            text-align: left;
            padding-left: 20px;
            opacity: 0.6;
            font-size: 0.65em;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        /* Divider row */
        .sc-divider td {
            height: 1px;
            background: rgba(201,168,76,0.1);
            padding: 0;
        }

        /* Score cells */
        .sc-hole-cell {
            padding: 10px 6px !important;
            border-radius: 3px;
            margin: 2px;
            transition: transform 0.15s ease;
            cursor: default;
            position: relative;
        }

        .sc-hole-cell:hover { transform: scale(1.08); z-index: 2; }

        .sc-gross {
            display: block;
            font-weight: 600;
            font-size: 0.95em;
            line-height: 1.2;
        }

        .sc-pts-small {
            display: block;
            font-size: 0.6em;
            opacity: 0.65;
            letter-spacing: 0.04em;
            margin-top: 1px;
        }

        .sc-total-col {
            padding: 10px 16px 10px 8px !important;
        }

        .sc-total-col .sc-gross {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.15em;
            font-weight: 700;
            color: var(--white);
        }

        .sc-total-col .sc-pts-small {
            color: var(--gold);
            font-size: 0.65em;
            font-weight: 500;
            opacity: 1;
        }

        .sc-label-cell {
            text-align: left !important;
            padding-left: 20px !important;
            padding-right: 12px !important;
            font-size: 0.78em;
            font-weight: 500;
            color: var(--text-light);
        }

        /* Score colors */
        .sc-eagle  { background: rgba(201,168,76,0.35); color: var(--gold-light); }
        .sc-birdie { background: var(--sc-birdie-bg);   color: var(--sc-birdie-text); }
        .sc-par    { background: var(--sc-par-bg);      color: var(--sc-par-text); }
        .sc-bogey  { background: var(--sc-bogey-bg);    color: var(--sc-bogey-text); }
        .sc-double { background: var(--sc-double-bg);   color: var(--sc-double-text); }
        .sc-triple { background: var(--sc-triple-bg);   color: var(--sc-triple-text); }
        .sc-zero-pts { opacity: 0.6; }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-style: italic;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1em;
            letter-spacing: 0.04em;
        }

        /* ── Footer ── */
        footer {
            text-align: center;
            padding: 48px 0;
            border-top: 1px solid var(--card-border);
            margin-top: 20px;
        }

        footer p { font-size: 0.75em; color: var(--text-muted); letter-spacing: 0.15em; text-transform: uppercase; }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            inset: 0;
            background-color: rgba(0,0,0,0.75);
            overflow-y: auto;
            backdrop-filter: blur(4px);
        }

        .modal.active { display: block; animation: fadeIn 0.25s ease-out; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: var(--dark-green);
            border: 1px solid var(--card-border);
            margin: 60px auto;
            border-radius: 6px;
            max-width: 700px;
            width: 90%;
            box-shadow: 0 30px 80px rgba(0,0,0,0.5);
            animation: modalSlide 0.3s ease-out;
        }

        @keyframes modalSlide { from { transform: translateY(-30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .modal-header {
            padding: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--card-border);
        }

        .modal-header h2 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.8em;
            color: var(--white);
            letter-spacing: 0.06em;
            margin: 0;
            animation: none;
            opacity: 1;
            text-transform: none;
        }

        .close {
            color: var(--text-muted);
            font-size: 1.8em;
            cursor: pointer;
            transition: color 0.2s;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }

        .close:hover { color: var(--white); background: rgba(255,255,255,0.06); }

        .modal-body { padding: 32px; }

        .player-summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 36px; }

        .stat-box {
            text-align: center;
            padding: 16px 8px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 4px;
        }

        .stat-label { font-size: 0.68em; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }

        .stat-value { font-family: 'Cormorant Garamond', serif; font-size: 1.8em; font-weight: 700; color: var(--white); }

        .rounds-list h3 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 500;
            font-size: 1em;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--card-border);
        }

        .round-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            margin: 6px 0;
            border-radius: 3px;
            border-left: 3px solid transparent;
            transition: background 0.2s;
        }

        .round-item:hover { background: rgba(255,255,255,0.02); }

        .round-item.top15 { background: rgba(201,168,76,0.05); border-left-color: var(--gold); }
        .round-item.top15 .round-points { color: var(--gold); }

        .round-info { flex: 1; }
        .round-course { font-weight: 500; color: var(--text-light); font-size: 0.92em; }
        .modal .round-date { font-size: 0.78em; color: var(--text-muted); margin-top: 2px; }
        .round-score { text-align: center; margin: 0 20px; font-size: 0.9em; color: var(--text-muted); }
        .round-points { font-family: 'Cormorant Garamond', serif; font-size: 1.2em; font-weight: 600; color: var(--text-light); min-width: 60px; text-align: right; }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            h1 { font-size: 2.4em; letter-spacing: 0.08em; }
            .hero { height: 260px; }
            .tagline { font-size: 0.95em; letter-spacing: 0.15em; }
            section { padding: 40px 0; }
            h2 { font-size: 1.3em; margin-bottom: 28px; }
            .player-card { padding: 18px 20px; gap: 16px; }
            .rank { font-size: 1.5em; min-width: 36px; }
            .player-name { font-size: 1.2em; }
            .player-stats { font-size: 0.72em; }
            .total-points { font-size: 1.8em; min-width: 60px; }
            .round-header { flex-direction: column; gap: 4px; padding: 18px 20px 12px; }
            .course { padding: 0 20px 16px; }
            th, td { padding: 10px 16px; }
            .modal-content { margin: 20px auto; width: 94%; }
            .player-summary { grid-template-columns: repeat(2, 1fr); }
            .round-item { flex-direction: column; align-items: flex-start; gap: 6px; }
            .round-score { margin: 0; }
            .round-points { align-self: flex-end; }
            .scorecard-toggle { padding: 14px 20px; }
            .sc-player-header { padding: 12px 16px; }
        }

        @media (max-width: 480px) {
            .page-wrapper { padding: 0 16px; }
            h1 { font-size: 2em; }
            .player-card { padding: 14px 16px; gap: 12px; }
            .rank { font-size: 1.3em; min-width: 30px; }
            .player-name { font-size: 1.05em; }
            .total-points { font-size: 1.5em; min-width: 50px; }
            table { font-size: 0.85em; display: block; overflow-x: auto; }
            th, td { padding: 10px 12px; white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <header>
        <div class="hero">
            <img class="hero-img" src="https://images.unsplash.com/photo-1535131749006-b7f58c99034b?w=1400&q=80&auto=format" alt="Golf course">
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>GUCCI Golf</h1>
                <div class="divider"></div>
                <p class="tagline">Sæson 2026</p>
            </div>
        </div>
    </header>

    <section>
        <h2>Samlet Stilling</h2>
        <p class="section-subtitle">Baseret på de 15 bedste runder for hver spiller</p>
        <div id="leaderboard" class="leaderboard">
            <div class="empty-state">Indlæser...</div>
        </div>
    </section>

    <section class="rounds-section">
        <h2>Spillede Runder</h2>
        <div id="rounds">
            <div class="empty-state">Indlæser...</div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 GUCCI Golf &mdash; Hvor præcision møder passion</p>
    </footer>
</div>

<!-- Player Details Modal -->
<div id="playerModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalPlayerName"></h2>
            <span class="close">&times;</span>
        </div>
        <div class="modal-body">
            <div class="player-summary" id="playerSummary"></div>
            <div class="rounds-list">
                <h3>Alle runder</h3>
                <div id="playerRounds"></div>
            </div>
        </div>
    </div>
</div>

<script>
// ╔══════════════════════════════════════════════════════════════════╗
// ║                    SPILLERE OG DATA                            ║
// ╚══════════════════════════════════════════════════════════════════╝

const PLAYERS = ['Thomas', 'Henrik', 'Kim', 'Morten'];

// ─── RUNDER ──────────────────────────────────────────────────────────────────
// Hvert element i ROUNDS_DATA har:
//   course      – banenavn
//   date        – ISO-dato "YYYY-MM-DD"
//   tee         – tee-nr (vises i scorekortet)
//   holes       – antal huller spillet (9 eller 18)
//   cr / slope  – banerating
//   holeData    – [{ hole, par, hcp }, ...] (valgfrit, kræves for scorekortet)
//   results     – [{ player, score (stbf-total), points (liga), placement, tied }]
//   scorecards  – [{ player, hcp, phcp, scores[], points[], slag, grossDiff }] (valgfrit)
//
// POINTSYSTEM:
//   Sidstepladsen = 0, +1 for hver bedre plac.
//   4 spillere: 3-2-1-0 · 3 spillere: 2-1-0 · 2 spillere: 1-0
//   Delt: summer og divider
// ─────────────────────────────────────────────────────────────────────────────

const ROUNDS_DATA = [

    // ===== RUNDE 1 — 10. april 2026 =====
    {
        course: "Old Course",
        date: "2026-04-10",
        tee: 56,
        holes: 9,
        cr: 72.3,
        slope: 139,
        holeData: [
            { hole: 1, par: 4, hcp: 11 },
            { hole: 2, par: 5, hcp: 5  },
            { hole: 3, par: 4, hcp: 13 },
            { hole: 4, par: 4, hcp: 1  },
            { hole: 5, par: 3, hcp: 15 },
            { hole: 6, par: 4, hcp: 9  },
            { hole: 7, par: 4, hcp: 3  },
            { hole: 8, par: 3, hcp: 17 },
            { hole: 9, par: 5, hcp: 7  },
        ],
        results: [
            { player: "Thomas", score: 21, points: 2, placement: 1, tied: false },
            { player: "Henrik", score: 18, points: 1, placement: 2, tied: false },
            { player: "Kim",    score: 13, points: 0, placement: 3, tied: false },
        ],
        scorecards: [
            {
                player: "Thomas",
                hcp: 11.6, phcp: 15,
                scores:  [4, 6, 6, 4, 4, 4, 4, 4, 5],
                points:  [3, 2, 1, 3, 2, 3, 3, 1, 3],
                slag: 41,
                grossDiff: -3,
            },
            {
                player: "Henrik",
                hcp: 15.4, phcp: 19,
                scores:  [4, 6, 4, 6, 4, 7, 5, 3, 7],
                points:  [3, 2, 3, 2, 2, 0, 2, 3, 1],
                slag: 46,
                grossDiff: 0,
            },
            {
                player: "Kim",
                hcp: 18.9, phcp: 24,
                scores:  [5, 9, 5, 6, 6, 5, 7, 4, 6],
                points:  [2, 0, 2, 2, 0, 2, 1, 2, 2],
                slag: 53,
                grossDiff: 5,
            },
        ]
    },

    // ===== TILFØJ NYE RUNDER HERUNDER =====
    // Kopier skabelonen:
    //
    // {
    //     course: "Banenavn",
    //     date: "2026-MM-DD",
    //     tee: 00,
    //     holes: 9,          // eller 18
    //     cr: 00.0,
    //     slope: 000,
    //     holeData: [
    //         { hole: 1, par: 4, hcp: 11 },
    //         // ... resten af hullerne
    //     ],
    //     results: [
    //         { player: "Thomas", score: 00, points: 0, placement: 0, tied: false },
    //         { player: "Henrik", score: 00, points: 0, placement: 0, tied: false },
    //         { player: "Kim",    score: 00, points: 0, placement: 0, tied: false },
    //         { player: "Morten", score: 00, points: 0, placement: 0, tied: false },
    //     ],
    //     scorecards: [
    //         {
    //             player: "Thomas",
    //             hcp: 00.0, phcp: 00,
    //             scores:  [0, 0, 0, 0, 0, 0, 0, 0, 0],
    //             points:  [0, 0, 0, 0, 0, 0, 0, 0, 0],
    //             slag: 00,
    //             grossDiff: 0,     // negativ = under, 0 = even, positiv = over
    //         },
    //         // ... resten af spillerne
    //     ]
    // },

];


// ╔══════════════════════════════════════════════════════════════════╗
// ║           HERFRA OG NED BEHØVER DU IKKE REDIGERE              ║
// ╚══════════════════════════════════════════════════════════════════╝

let allRounds = [];
let playerData = {};

// ── Scorecard helpers ──────────────────────────────────────────────

function scoreClass(gross, par) {
    const diff = gross - par;
    if (diff <= -2) return 'sc-eagle';
    if (diff === -1) return 'sc-birdie';
    if (diff === 0)  return 'sc-par';
    if (diff === 1)  return 'sc-bogey';
    if (diff === 2)  return 'sc-double';
    return 'sc-triple';
}

function renderScorecard(round, idx) {
    if (!round.scorecards || !round.holeData || round.scorecards.length === 0) return '';

    const holes = round.holeData;
    const pars  = holes.map(h => h.par);
    const totalPar = pars.reduce((a, b) => a + b, 0);

    const playerBlocks = round.scorecards.map(sc => {
        const totalScore = sc.scores.reduce((a, b) => a + b, 0);
        const totalPoints = sc.points.reduce((a, b) => a + b, 0);

        const diffSign = sc.grossDiff === 0 ? 'E'
            : sc.grossDiff < 0 ? sc.grossDiff
            : '+' + sc.grossDiff;
        const diffClass = sc.grossDiff < 0 ? 'under' : sc.grossDiff === 0 ? 'even' : 'over';

        // Build hole cells
        let holeCells = '';
        sc.scores.forEach((gross, i) => {
            const par = pars[i];
            const cls = scoreClass(gross, par);
            const pts = sc.points[i];
            const zeroClass = pts === 0 ? ' sc-zero-pts' : '';
            holeCells += `
                <td>
                    <div class="sc-hole-cell ${cls}${zeroClass}">
                        <span class="sc-gross">${gross}</span>
                        <span class="sc-pts-small">${pts}pt</span>
                    </div>
                </td>`;
        });

        return `
            <div class="sc-player-block">
                <div class="sc-player-header">
                    <div class="sc-player-header-name">${sc.player}</div>
                    <span class="sc-hcp-badge">HCP ${sc.hcp} (PHCP ${sc.phcp})</span>
                    <span class="sc-diff-badge ${diffClass}">${diffSign}</span>
                    <div class="sc-total-badge">
                        ${totalPoints}<span class="sc-total-sub">&nbsp;pt</span>
                    </div>
                </div>
                <div class="sc-table-wrap">
                    <table class="sc-table">
                        <thead>
                            <tr class="sc-row-holes">
                                <th class="sc-label-cell">Hul</th>
                                ${holes.map(h => `<th>${h.hole}</th>`).join('')}
                                <th>I alt</th>
                            </tr>
                            <tr class="sc-row-par">
                                <td class="sc-label-cell">Par</td>
                                ${pars.map(p => `<td>${p}</td>`).join('')}
                                <td class="sc-total-col" style="font-weight:600;color:var(--text-light)">${totalPar}</td>
                            </tr>
                            <tr class="sc-row-hcp">
                                <td class="sc-label-cell">HCP</td>
                                ${holes.map(h => `<td>${h.hcp}</td>`).join('')}
                                <td></td>
                            </tr>
                        </thead>
                        <tbody>
                            <tr class="sc-divider"><td colspan="${holes.length + 2}"></td></tr>
                            <tr>
                                <td class="sc-label-cell">${sc.player}</td>
                                ${holeCells}
                                <td class="sc-total-col">
                                    <span class="sc-gross" style="font-family:'Cormorant Garamond',serif;font-size:1.2em;font-weight:700;color:var(--white);">${totalScore}</span>
                                    <span class="sc-pts-small" style="color:var(--gold);font-size:0.7em;font-weight:500;opacity:1;">${totalPoints} pt</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        `;
    }).join('');

    return `
        <button class="scorecard-toggle" id="sc-btn-${idx}" onclick="toggleScorecard(${idx})">
            <div class="sc-toggle-icon">▾</div>
            <span class="sc-toggle-label">Scorekort</span>
            <span class="sc-toggle-hint">Vis hulvis scorecard</span>
        </button>
        <div class="scorecard-panel" id="sc-${idx}">
            <div class="scorecard-inner">
                <div class="sc-player-cards">
                    ${playerBlocks}
                </div>
            </div>
        </div>
    `;
}

function toggleScorecard(idx) {
    const panel = document.getElementById(`sc-${idx}`);
    const btn   = document.getElementById(`sc-btn-${idx}`);
    if (!panel) return;

    if (panel.classList.contains('open')) {
        panel.style.maxHeight = '0';
        panel.classList.remove('open');
        btn.classList.remove('open');
    } else {
        panel.classList.add('open');
        btn.classList.add('open');
        panel.style.maxHeight = panel.scrollHeight + 'px';
    }
}

// ── Player modal ───────────────────────────────────────────────────

function showPlayerDetails(playerName) {
    const modal          = document.getElementById('playerModal');
    const modalPlayerName= document.getElementById('modalPlayerName');
    const playerSummary  = document.getElementById('playerSummary');
    const playerRounds   = document.getElementById('playerRounds');
    const player         = playerData[playerName];
    if (!player) return;

    modalPlayerName.textContent = playerName;

    const avg    = player.best15.length > 0 ? (player.total / player.best15.length).toFixed(1) : '0.0';
    const allAvg = player.allRounds.length > 0
        ? (player.allRounds.reduce((s, r) => s + r.points, 0) / player.allRounds.length).toFixed(1)
        : '0.0';

    playerSummary.innerHTML = `
        <div class="stat-box"><div class="stat-label">Total</div><div class="stat-value">${player.total.toFixed(1)}</div></div>
        <div class="stat-box"><div class="stat-label">Runder</div><div class="stat-value">${player.allRounds.length}</div></div>
        <div class="stat-box"><div class="stat-label">Top 15 gns.</div><div class="stat-value">${avg}</div></div>
        <div class="stat-box"><div class="stat-label">Alle gns.</div><div class="stat-value">${allAvg}</div></div>
    `;

    const sortedRounds = [...player.allRounds].sort((a, b) => b.points - a.points);
    const top15Points  = new Set(player.best15);

    let roundsHtml = '';
    sortedRounds.forEach((round, index) => {
        const isTop15 = top15Points.has(round.points) && index < 15;
        const formattedDate = new Date(round.date).toLocaleDateString('da-DK', { day: 'numeric', month: 'short', year: 'numeric' });

        roundsHtml += `
            <div class="round-item ${isTop15 ? 'top15' : ''}">
                <div class="round-info">
                    <div class="round-course">${round.course}</div>
                    <div class="round-date">${formattedDate}</div>
                </div>
                <div class="round-score">${round.score} stbf</div>
                <div class="round-points">${round.points.toFixed(1)} pt</div>
            </div>
        `;
    });

    playerRounds.innerHTML = roundsHtml;
    modal.classList.add('active');
}

// ── Leaderboard calculation ────────────────────────────────────────

function calculateLeaderboard(rounds) {
    const players = {};
    PLAYERS.forEach(name => {
        players[name] = { name, allPoints: [], allRounds: [], totalRounds: 0 };
    });

    rounds.forEach(round => {
        round.results.forEach(result => {
            if (players[result.player]) {
                players[result.player].allPoints.push(result.points);
                players[result.player].allRounds.push({
                    course: round.course,
                    date:   round.date,
                    score:  result.score,
                    points: result.points,
                    placement: result.placement,
                });
                players[result.player].totalRounds++;
            }
        });
    });

    Object.values(players).forEach(p => {
        p.allPoints.sort((a, b) => b - a);
        p.best15 = p.allPoints.slice(0, 15);
        p.total  = p.best15.reduce((s, v) => s + v, 0);
    });

    playerData = players;
    return Object.values(players).sort((a, b) => b.total - a.total);
}

// ── Display leaderboard ────────────────────────────────────────────

function displayLeaderboard(leaderboard) {
    const container = document.getElementById('leaderboard');

    if (leaderboard.every(p => p.totalRounds === 0)) {
        container.innerHTML = '<div class="empty-state">Sæsonen er ikke startet endnu — første runde afventes</div>';
        return;
    }

    let html = '';
    leaderboard.forEach((player, index) => {
        const avg      = player.best15.length > 0 ? (player.total / player.best15.length).toFixed(1) : '–';
        const isLeader = index === 0 && player.total > 0;

        html += `
            <div class="player-card ${isLeader ? 'leader' : ''}" onclick="showPlayerDetails('${player.name}')">
                <div class="rank">${index + 1}</div>
                <div class="player-info">
                    <div class="player-name">${player.name}</div>
                    <div class="player-stats">
                        ${player.totalRounds} runder${player.totalRounds > 0 ? ` · Gns. ${avg} pt` : ''}
                    </div>
                </div>
                <div class="total-points">${player.total.toFixed(1)}<span class="unit">pt</span></div>
            </div>
        `;
    });

    container.innerHTML = html;
}

// ── Display rounds ─────────────────────────────────────────────────

function displayRounds(rounds) {
    const container = document.getElementById('rounds');

    if (rounds.length === 0) {
        container.innerHTML = '<div class="empty-state">Ingen runder spillet endnu</div>';
        return;
    }

    const sortedRounds = [...rounds].sort((a, b) => new Date(b.date) - new Date(a.date));

    let html = '';
    sortedRounds.forEach((round, index) => {
        const roundNumber   = sortedRounds.length - index;
        const formattedDate = new Date(round.date).toLocaleDateString('da-DK', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
        });

        const sortedResults = [...round.results].sort((a, b) => a.placement - b.placement);

        const metaParts = [];
        if (round.holes)  metaParts.push(`${round.holes} hul${round.holes !== 1 ? 'ler' : ''}`);
        if (round.tee)    metaParts.push(`Tee ${round.tee}`);
        if (round.cr)     metaParts.push(`CR ${round.cr}`);
        if (round.slope)  metaParts.push(`Slope ${round.slope}`);
        const metaHtml = metaParts.length ? `<span class="course-meta">${metaParts.map(m => `<span>${m}</span>`).join('')}</span>` : '';

        const scorecardHtml = renderScorecard(round, index);

        const rows = sortedResults.map(result => {
            const place = result.tied ? `${result.placement}=` : `${result.placement}.`;
            const pts   = result.points % 1 === 0 ? result.points : result.points.toFixed(1);
            return `
                <tr>
                    <td class="placement">${place}</td>
                    <td>${result.player}</td>
                    <td>${result.score}</td>
                    <td class="points">${pts}</td>
                </tr>`;
        }).join('');

        html += `
            <div class="round" style="animation-delay: ${index * 0.1}s">
                <div class="round-header">
                    <div class="round-title">Runde ${roundNumber}</div>
                    <div class="round-date">${formattedDate}</div>
                </div>
                <div class="course">${round.course}${metaHtml}</div>
                <table>
                    <thead>
                        <tr>
                            <th>Plac.</th>
                            <th>Spiller</th>
                            <th>Stableford</th>
                            <th>Point</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
                ${scorecardHtml}
            </div>
        `;
    });

    container.innerHTML = html;
}

// ── Bootstrap ──────────────────────────────────────────────────────

document.addEventListener('DOMContentLoaded', function () {
    const modal    = document.getElementById('playerModal');
    const closeBtn = document.querySelector('.close');
    closeBtn.onclick = () => modal.classList.remove('active');
    window.onclick = e => { if (e.target === modal) modal.classList.remove('active'); };
    document.addEventListener('keydown', e => { if (e.key === 'Escape') modal.classList.remove('active'); });
});

function init() {
    allRounds = ROUNDS_DATA;
    displayLeaderboard(calculateLeaderboard(allRounds));
    displayRounds(allRounds);
}

init();
</script>
</body>
</html>
